name: DiffPal
description: Run DiffPal review in GitHub Actions.
author: DiffPal
branding:
  icon: check-circle
  color: blue
inputs:
  install:
    description: Install @diffpal/diffpal before running the review.
    required: false
    default: "true"
  diffpal-version:
    description: npm version or dist-tag for @diffpal/diffpal. Use an exact version for reproducible CI.
    required: false
    default: latest
  diffpal-path:
    description: Path to an existing diffpal binary. Custom paths skip automatic installation.
    required: false
    default: diffpal
  base:
    description: Base revision passed to diffpal review github.
    required: true
  head:
    description: Head revision passed to diffpal review github.
    required: true
  config-dir:
    description: Extra config root directory passed before the review command.
    required: false
    default: ""
  profile:
    description: Config profile name passed before the review command.
    required: false
    default: ""
  block-on:
    description: Severity threshold that marks findings as blocking.
    required: false
    default: high
  gate:
    description: Return non-zero when blocking findings exist.
    required: false
    default: "false"
  mode:
    description: Comma-separated GitHub publish modes.
    required: false
    default: ""
  feedback:
    description: Review feedback shape. Use summary, balanced, or inline.
    required: false
    default: balanced
  summary-overview:
    description: Include a semantic change overview in review summaries.
    required: false
    default: "true"
  out:
    description: Output findings bundle path.
    required: false
    default: ""
  repo:
    description: Repository id for deterministic fingerprints.
    required: false
    default: ""
  review-id:
    description: Review identifier for deterministic outputs.
    required: false
    default: ""
  review-channel:
    description: GitHub publishing channel for check runs and summary comments.
    required: false
    default: diffpal
  max-files:
    description: Maximum files from diff.
    required: false
    default: ""
  context-lines:
    description: Context lines to enrich each changed file.
    required: false
    default: ""
  max-patch-chars:
    description: Maximum context characters per chunk.
    required: false
    default: ""
  max-files-per-chunk:
    description: Maximum files per context chunk.
    required: false
    default: ""
  language:
    description: Language for generated review findings.
    required: false
    default: ""
  review-checks:
    description: "Comma-separated checks to run: security, bugs, performance, best-practices."
    required: false
    default: ""
  instructions:
    description: Additional review instructions for local prompt tuning.
    required: false
    default: ""
  instructions-file:
    description: Path to additional review instructions.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Install DiffPal CLI
      shell: bash
      env:
        INPUT_INSTALL: ${{ inputs.install }}
        INPUT_DIFFPAL_VERSION: ${{ inputs.diffpal-version }}
        INPUT_DIFFPAL_PATH: ${{ inputs.diffpal-path }}
      run: ${{ github.action_path }}/tasks/github/install-diffpal.sh

    - name: Run DiffPal Review
      shell: bash
      env:
        INPUT_BASE: ${{ inputs.base }}
        INPUT_HEAD: ${{ inputs.head }}
        INPUT_CONFIG_DIR: ${{ inputs.config-dir }}
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_BLOCK_ON: ${{ inputs.block-on }}
        INPUT_GATE: ${{ inputs.gate }}
        INPUT_MODE: ${{ inputs.mode }}
        INPUT_FEEDBACK: ${{ inputs.feedback }}
        INPUT_SUMMARY_OVERVIEW: ${{ inputs.summary-overview }}
        INPUT_OUT: ${{ inputs.out }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_REVIEW_ID: ${{ inputs.review-id }}
        INPUT_REVIEW_CHANNEL: ${{ inputs.review-channel }}
        INPUT_MAX_FILES: ${{ inputs.max-files }}
        INPUT_CONTEXT_LINES: ${{ inputs.context-lines }}
        INPUT_MAX_PATCH_CHARS: ${{ inputs.max-patch-chars }}
        INPUT_MAX_FILES_PER_CHUNK: ${{ inputs.max-files-per-chunk }}
        INPUT_LANGUAGE: ${{ inputs.language }}
        INPUT_REVIEW_CHECKS: ${{ inputs.review-checks }}
        INPUT_INSTRUCTIONS: ${{ inputs.instructions }}
        INPUT_INSTRUCTIONS_FILE: ${{ inputs.instructions-file }}
      run: ${{ github.action_path }}/tasks/github/run-diffpal-review.sh
