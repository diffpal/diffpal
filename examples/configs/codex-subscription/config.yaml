version: v1

runtime:
  providers:
    codex-acp:
      type: codex_acp
      codex_acp:
        reasoning_effort: low

diffpal:
  provider: codex-acp
  gate:
    block_on: high
  review:
    language: en
    prompt_profile: v2
    strict_evidence: true
    strict_injection: true
    allow_nearby_context: true
    instructions: |
      Prefer actionable findings that are directly supported by the diff.
    checks:
      - security
      - bugs
      - performance
      - best-practices
  platforms:
    github: {}
    gitlab: {}
    azure: {}

profiles:
  ci:
    diffpal:
      gate:
        block_on: high
      review:
        prompt_profile: v2
        strict_evidence: true
        strict_injection: true
        allow_nearby_context: true
