version: v1

runtime:
  providers:
    copilot-acp:
      type: copilot_acp
      copilot_acp:
        model: auto

diffpal:
  provider: copilot-acp
  gate:
    block_on: high
  review:
    language: en
    instructions: |
      Prefer actionable findings that are directly supported by the diff.
  platforms:
    github: {}
    gitlab: {}
    azure: {}

profiles:
  ci:
    diffpal:
      gate:
        block_on: high
