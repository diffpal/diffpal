name: omnidist-check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  npm-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OMNIDIST_VERSION: 0.1.0-dev.0
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install omnidist
        run: npm install --global @omnidist/omnidist@latest

      - name: Build artifacts
        run: omnidist --profile default build

      - name: Stage npm artifacts
        run: omnidist --profile default npm stage

      - name: Verify npm artifacts
        run: omnidist --profile default npm verify
