name: lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run vet
        run: go vet ./...

      - name: Run golangci-lint
        run: go tool golangci-lint run ./...

      - name: Validate GitHub Actions
        run: go tool actionlint

      - name: Validate CLI surface
        run: go run ./cmd/diffpal --help
