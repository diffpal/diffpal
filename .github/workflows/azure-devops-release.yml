name: azure-devops-release

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "SemVer version to verify against Azure extension manifests. Defaults to package.json version."
        required: false
        type: string
      publish:
        description: "Publish to Azure DevOps Marketplace after packaging."
        required: true
        default: true
        type: boolean
      channel:
        description: "Which extension package to publish."
        required: true
        default: both
        type: choice
        options:
          - both
          - prod
          - dev

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tasks/azure-devops/package-lock.json

      - name: Install dependencies
        run: npm --prefix tasks/azure-devops ci

      - name: Audit runtime dependencies
        run: npm --prefix tasks/azure-devops audit --omit=dev --audit-level=high

      - name: Smoke test task handler
        run: npm --prefix tasks/azure-devops run smoke

      - name: Check Azure extension version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          elif [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          else
            version="$(node -p "require('./tasks/azure-devops/package.json').version")"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi

          for file in \
            tasks/azure-devops/package.json \
            tasks/azure-devops/vss-extension.json \
            tasks/azure-devops/vss-extension.dev.json
          do
            file_version="$(node -p "require('./$file').version")"
            if [[ "$file_version" != "$version" ]]; then
              echo "$file version $file_version does not match tag $version." >&2
              echo "Run: task release:set-version VERSION=$version" >&2
              exit 1
            fi
          done

      - name: Package Azure DevOps extensions
        run: |
          npm --prefix tasks/azure-devops run package:prod
          npm --prefix tasks/azure-devops run package:dev

      - name: Upload Azure DevOps extension artifacts
        uses: actions/upload-artifact@v7
        with:
          name: azure-devops-vsix
          path: |
            dist/diffpal.vsix
            dist/diffpal-dev.vsix
          if-no-files-found: error

  publish:
    needs: package
    if: ${{ github.event_name == 'push' || inputs.publish }}
    runs-on: ubuntu-latest
    environment: azure-devops-marketplace
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tasks/azure-devops/package-lock.json

      - name: Install publishing dependencies
        run: npm --prefix tasks/azure-devops ci

      - name: Download Azure DevOps extension artifacts
        uses: actions/download-artifact@v8
        with:
          name: azure-devops-vsix
          path: dist

      - name: Verify publish token
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
        run: |
          if [[ -z "$AZURE_DEVOPS_EXT_PAT" ]]; then
            echo "AZURE_DEVOPS_EXT_PAT is required to publish Azure DevOps Marketplace extensions." >&2
            exit 1
          fi

      - name: Publish Azure DevOps extensions
        env:
          AZURE_DEVOPS_EXT_PAT: ${{ secrets.AZURE_DEVOPS_EXT_PAT }}
          CHANNEL: ${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'both' }}
        run: |
          publish_vsix() {
            local path="$1"
            tasks/azure-devops/node_modules/.bin/tfx extension publish \
              --vsix "$path" \
              --auth-type pat \
              --token "$AZURE_DEVOPS_EXT_PAT" \
              --no-prompt
          }

          case "$CHANNEL" in
            both)
              publish_vsix dist/diffpal.vsix
              publish_vsix dist/diffpal-dev.vsix
              ;;
            prod)
              publish_vsix dist/diffpal.vsix
              ;;
            dev)
              publish_vsix dist/diffpal-dev.vsix
              ;;
            *)
              echo "Unsupported publish channel: $CHANNEL" >&2
              exit 1
              ;;
          esac
