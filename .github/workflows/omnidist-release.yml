# Generated by "omnidist ci". Re-run the command to refresh this workflow.
name: omnidist-release
on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Set release version
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "tag ${GITHUB_REF_NAME} is not a SemVer release tag" >&2
            exit 1
          fi
          echo "OMNIDIST_VERSION=$version" >> "$GITHUB_ENV"
      - name: Install omnidist
        run: npm install --global @omnidist/omnidist@latest
      - name: Build artifacts
        run: omnidist --profile default build
      - name: Stage artifacts
        run: omnidist --profile default npm stage
      - name: Verify artifacts
        run: omnidist --profile default npm verify
      - name: Pack staged artifacts
        run: tar -czf omnidist-staged.tgz .omnidist/default
      - name: Upload staged artifacts
        uses: actions/upload-artifact@v7
        with:
          name: omnidist-staged
          path: omnidist-staged.tgz
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: .omnidist/default/dist/**/*
          if-no-files-found: error

  publish_npm:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
      NPM_CONFIG_PROVENANCE: "false"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Install omnidist
        run: npm install --global @omnidist/omnidist@latest
      - name: Download staged artifacts
        uses: actions/download-artifact@v8
        with:
          name: omnidist-staged
      - name: Restore staged artifacts
        run: tar -xzf omnidist-staged.tgz
      - name: Publish npm artifacts
        run: omnidist --profile default npm publish

  release:
    needs:
      - prepare
      - publish_npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: .omnidist/default/dist
          merge-multiple: true
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          while IFS= read -r -d '' f; do
            rel="${f#.omnidist/default/dist/}"
            os="${rel%%/*}"
            rem="${rel#*/}"
            arch="${rem%%/*}"
            name="${rel##*/}"
            ext=""
            base="$name"
            if [[ "$name" == *.exe ]]; then
              ext=".exe"
              base="${name%.exe}"
            fi
            cp "$f" "release-assets/${base}-${os}-${arch}${ext}"
          done < <(find .omnidist/default/dist -type f ! -name VERSION -print0 | sort -z)
      - name: Generate checksums
        run: |
          cd release-assets
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum -- > checksums.tmp
          mv checksums.tmp checksums.txt
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
