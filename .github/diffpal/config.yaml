version: v1

defaults:
  provider: openai-fast
  policy: default

providers:
  openai-fast:
    type: openai
    openai:
      model: "${DIFFPAL_OPENAI_MODEL}"
      api_key: "${OPENAI_API_KEY}"

policies:
  default:
    block_on: high

review:
  context_lines: 20
  max_files: 200
  chunking:
    max_patch_chars: 12000
    max_files_per_chunk: 20

platforms:
  github:
    auth:
      token: "${GITHUB_TOKEN}"
