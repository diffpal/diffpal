version: v1

runtime:
  providers:
    copilot-acp:
      type: copilot_acp
      copilot_acp:
        model: gpt-5-mini

diffpal:
  provider: copilot-acp
  gate:
    block_on: high
  review:
    language: en
    instructions: |
      Prefer actionable findings that are directly supported by the diff.
    checks:
      - security
      - bugs
      - performance
      - best-practices
  platforms:
    github: {}

profiles:
  ci:
    diffpal:
      gate:
        block_on: high
