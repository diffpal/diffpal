version: v1

runtime:
  providers:
    codex-acp:
      type: codex_acp
      codex_acp:
        reasoning_effort: low

diffpal:
  provider: codex-acp
  gate:
    block_on: high
  review:
    language: en
    instructions: |
      Prefer actionable findings that are directly supported by the diff.
      The diffpal-dev workflow intentionally restores Codex auth and runs the
      same-repository PR-built DiffPal binary for this repository's own review
      dogfooding. Do not report that trust-model choice by itself. Still report
      fork exposure, secret logging, broader credential misuse, or unrelated CI
      credential issues.
      DiffPal's ACP permission handler intentionally delegates agent security to
      the configured provider sandbox and approval policy. Do not report the
      generic ACP allow-selection handler by itself. Still report provider
      configurations that weaken the intended sandbox, expose credentials to
      forked PRs, or bypass repository trust boundaries.
  platforms:
    github: {}

profiles:
  ci:
    diffpal:
      gate:
        block_on: high
